<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BINC International — Grow In Retail</title>
<link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0948/5235/0296/files/FAICON_BINC.png?v=1765981771"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--gold:#a89552;--gold2:#c8b66b;--white:#fff;
  --dim:rgba(255,255,255,.58);--border:rgba(255,255,255,.08);
  --border-gold:rgba(168,149,82,.24);
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --font-ui:'Rajdhani',sans-serif;
  --font-gd-display:'Bebas Neue',sans-serif;
  --font-gd-mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth;cursor:none}
body{background:#000;color:#fff;font-family:var(--font-body);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#cur,#cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;mix-blend-mode:difference}
#cur{width:8px;height:8px;background:#fff;transform:translate(-50%,-50%)}
#cur-ring{width:34px;height:34px;border:1.5px solid rgba(255,255,255,.45);transform:translate(-50%,-50%);transition:width .3s,height .3s}
body:has(a:hover) #cur-ring,body:has(button:hover) #cur-ring{width:52px;height:52px}
::selection{background:var(--gold);color:#000}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:rgba(168,149,82,.72)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:76px;display:flex;align-items:center;justify-content:space-between;padding:0 6vw;transition:.4s;}
nav.scrolled{background:rgba(0,0,0,.88);backdrop-filter:blur(20px);}
.nav-logo{display:flex;align-items:center;text-decoration:none}
.nav-logo img{height:38px;width:auto;object-fit:contain}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links a{font-family:var(--font-ui);font-size:.78rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);text-decoration:none;padding:8px 16px;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:4px;left:16px;right:16px;height:1px;background:rgba(168,149,82,.85);transform:scaleX(0);transform-origin:left;transition:.3s;}
.nav-links a:hover{color:#fff}.nav-links a:hover::after{transform:scaleX(1)}
.nav-cta{color:#000!important;background:var(--gold)!important;padding:10px 26px!important;font-weight:700;border-radius:2px;}
.nav-cta::after{display:none!important}.nav-cta:hover{background:var(--gold2)!important;color:#000!important}

/* HERO */
#hero{position:relative;min-height:108vh;overflow:hidden;display:flex;align-items:center;background:#000;padding:110px 0 120px;}
.hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.54;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.78) 0%,rgba(0,0,0,.45) 46%,rgba(0,0,0,.18) 100%),linear-gradient(to bottom,rgba(0,0,0,.38) 0%,rgba(0,0,0,.08) 38%,rgba(0,0,0,.82) 100%);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(168,149,82,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(168,149,82,.035) 1px,transparent 1px);background-size:90px 90px;opacity:.55;animation:gridScroll 25s linear infinite;}
@keyframes gridScroll{from{transform:translateY(0)}to{transform:translateY(90px)}}
.g-orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}
.orb-a{width:500px;height:500px;background:rgba(168,149,82,.09);top:-8%;right:8%}
.orb-b{width:320px;height:320px;background:rgba(168,149,82,.055);bottom:10%;right:30%}
.hero-content{position:relative;z-index:10;padding:0 6vw;max-width:1500px;width:100%}
.hero-inner{margin-left:clamp(32px,7vw,140px);max-width:1050px}
.hero-title{font-family:var(--font-display);font-size:clamp(5rem,11vw,15rem);font-weight:900;line-height:.84;letter-spacing:-.01em;max-width:11ch;margin-bottom:40px;opacity:0;animation:riseUp .9s .25s forwards;}
.hero-title .gold{color:var(--gold)}.hero-title .stroke{-webkit-text-stroke:1.5px rgba(255,255,255,.36);color:transparent}
.hero-sub{font-size:1.05rem;line-height:1.85;color:rgba(255,255,255,.72);font-weight:300;max-width:520px;margin-bottom:48px;opacity:0;animation:riseUp .9s .45s forwards;}
.hero-btns{display:flex;gap:18px;flex-wrap:wrap;opacity:0;animation:riseUp .9s .65s forwards}
.btn-gold,.btn-outline,.btn-submit{font-family:var(--font-ui);font-weight:700;font-size:.8rem;letter-spacing:.25em;text-transform:uppercase;border-radius:2px;cursor:pointer;text-decoration:none;display:inline-block;transition:.2s;}
.btn-gold{color:#000;background:var(--gold);border:none;padding:17px 40px}
.btn-gold:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 12px 30px rgba(168,149,82,.22)}
.btn-outline{color:#fff;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.24);padding:16px 40px}
.btn-outline:hover{border-color:rgba(168,149,82,.65);background:rgba(168,149,82,.055)}
.hero-scroll{position:absolute;bottom:92px;left:6vw;z-index:10;display:flex;align-items:center;gap:14px;opacity:0;animation:fadeIn 1s 1.1s forwards;}
.scroll-pill{width:30px;height:48px;border:1px solid rgba(168,149,82,.58);border-radius:16px;position:relative;box-shadow:0 0 18px rgba(168,149,82,.12);}
.scroll-ball{width:5px;height:10px;background:var(--gold);border-radius:3px;position:absolute;left:50%;top:7px;transform:translateX(-50%);animation:scrollAnim 1.7s infinite;box-shadow:0 0 10px rgba(168,149,82,.55);}
.scroll-label{font-family:var(--font-ui);font-size:.66rem;font-weight:700;letter-spacing:.42em;text-transform:uppercase;color:rgba(255,255,255,.72);}
@keyframes scrollAnim{0%{top:7px;opacity:1}80%{top:27px;opacity:0}100%{top:7px;opacity:0}}
@keyframes riseUp{from{opacity:0;transform:translateY(44px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* TAPE */
.tape{background:var(--gold);padding:16px 0;overflow:hidden;white-space:nowrap;}
.tape-inner{display:inline-block;animation:marquee 24s linear infinite}
.tape-item{display:inline-block;font-family:var(--font-display);font-size:.95rem;font-weight:600;letter-spacing:.38em;text-transform:uppercase;color:#000;margin:0 28px;}
.tape-dot{display:inline-block;width:5px;height:5px;background:#fff;border-radius:50%;vertical-align:middle;margin:0 8px;opacity:.9;}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SHARED */
.section{padding:140px 6vw;background:#000}
.label{display:flex;align-items:center;gap:14px;font-family:var(--font-ui);font-size:.68rem;font-weight:700;letter-spacing:.45em;text-transform:uppercase;color:rgba(168,149,82,.9);margin-bottom:20px;}
.label::before{content:'';width:24px;height:1px;background:rgba(168,149,82,.75)}

/* APPROACH */
#approach{position:relative;padding:140px 6vw 130px;background:#000;}
.approach-grid{display:grid;grid-template-columns:minmax(0,780px) minmax(420px,640px);gap:90px;align-items:center;}
.approach-copy{max-width:780px;padding-left:clamp(24px,4vw,84px);}
.display{font-family:var(--font-display);font-size:clamp(3.6rem,5.9vw,8.1rem);font-weight:900;line-height:.9;color:#fff;max-width:780px;}
.approach-title-line{display:inline-block;white-space:nowrap;}
.body-text{font-size:1rem;line-height:1.92;color:var(--dim);font-weight:300;max-width:700px;}
.locator-panel{width:100%;max-width:620px;justify-self:end;background:linear-gradient(180deg,#11100b 0%,#080805 48%,#030303 100%);border:1px solid rgba(168,149,82,.28);border-radius:10px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.62),0 0 42px rgba(168,149,82,.07);}
.locator-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(168,149,82,.17);background:linear-gradient(90deg,rgba(168,149,82,.09),rgba(255,255,255,.025));}
.locator-heading{font-family:var(--font-ui);font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:#fff;}
.live-badge{display:flex;align-items:center;gap:8px;font-family:var(--font-ui);font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.82);}
.live-dot{position:relative;width:7px;height:7px;border-radius:50%;background:#00ff9d;box-shadow:0 0 10px rgba(0,255,157,.65);animation:liveFlicker 1.2s infinite ease-in-out;}
.live-dot::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(0,255,157,.28);animation:livePulse 1.2s infinite ease-out;}
@keyframes liveFlicker{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.92)}}
@keyframes livePulse{0%{opacity:.5;transform:scale(.6)}100%{opacity:0;transform:scale(1.6)}}
#storeMap{height:500px;width:100%;background:#0b0b0b;}

/* STATS */
#stats{background:#000;padding:105px 6vw 115px;}
.stats-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.stat-cell{min-height:260px;padding:54px 32px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;border-radius:16px;background:linear-gradient(145deg,rgba(255,255,255,.048),rgba(255,255,255,.012)),rgba(255,255,255,.014);border:1px solid rgba(168,149,82,.13);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 28px 80px rgba(0,0,0,.48);}
.stat-cell::before{content:'';position:absolute;inset:1px;border-radius:15px;background:radial-gradient(circle at 50% 0%,rgba(168,149,82,.07),transparent 44%);pointer-events:none;}
.stat-cell::after{content:'';position:absolute;top:0;left:50%;width:42%;height:1px;transform:translateX(-50%);background:linear-gradient(90deg,transparent,rgba(168,149,82,.75),transparent);opacity:.65;}
.stat-n{position:relative;z-index:1;font-family:var(--font-display);font-size:clamp(4.1rem,5.7vw,7.6rem);font-weight:800;letter-spacing:-.02em;line-height:.9;color:#fff;}
.stat-n sup{font-size:.38em;color:var(--gold);vertical-align:top;margin-left:2px;font-weight:700;}
.stat-l{position:relative;z-index:1;font-family:var(--font-ui);font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:24px;line-height:1.45;max-width:260px;}

/* CLIENTS INTRO */
#clients-intro{background:#000;padding:130px 6vw 0}
.ci-wrap{position:relative}
.ci-ghost{font-family:var(--font-display);font-size:clamp(10rem,22vw,32rem);font-weight:900;line-height:.85;-webkit-text-stroke:1px rgba(255,255,255,.04);color:transparent;position:absolute;right:-3vw;top:-2rem;}

/* GOLD DRY SHOWCASE */
#gd-showcase{position:relative;background:#000;}
#gd-scroll-wrapper{position:relative;height:500vh;}
#gd-sticky{position:sticky;top:0;height:100vh;width:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;}

.gd-bg{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 62% 44%,rgba(201,168,76,.10),transparent 32%),
    radial-gradient(circle at 38% 70%,rgba(201,168,76,.06),transparent 28%),#000;
}
.gd-bg::before,.gd-bg::after{content:"";position:absolute;border:1px solid rgba(201,168,76,.07);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.gd-bg::before{width:440px;height:440px;}
.gd-bg::after{width:700px;height:700px;opacity:.35;}

#gd-progress{position:absolute;top:0;left:0;width:0%;height:2px;z-index:10;background:linear-gradient(90deg,var(--gold),#e8c46a);}

.gd-can-wrap{
  position:absolute;top:50%;left:50%;
  width:min(20vw,220px);
  transform:translate(-50%,-50%);
  z-index:20;pointer-events:none;will-change:transform;
}
.gd-can-wrap img{width:100%;height:auto;display:block;filter:drop-shadow(0 40px 70px rgba(0,0,0,.95)) drop-shadow(0 0 50px rgba(201,168,76,.25));}
.gd-can-glow{position:absolute;inset:10% 0;background:radial-gradient(circle,rgba(201,168,76,.22),transparent 68%);filter:blur(32px);z-index:-1;}

.gd-panels{position:absolute;inset:0;pointer-events:none;}
.gd-panel{
  position:absolute;inset:0;
  display:flex;align-items:center;padding:0 6vw;
  opacity:0;transform:translateY(18px);
  transition:opacity .55s ease,transform .55s ease;
  pointer-events:none;
}
.gd-panel.gd-active{opacity:1;transform:translateY(0);pointer-events:auto;}
.gd-panel.gd-left{justify-content:flex-start;}
.gd-panel.gd-right{justify-content:flex-end;}
.gd-panel.gd-center{justify-content:center;text-align:center;}

.gd-content{max-width:400px;position:relative;z-index:30;}

.gd-eyebrow{display:block;color:var(--gold);font-family:var(--font-gd-mono);font-size:.63rem;letter-spacing:.28em;text-transform:uppercase;opacity:.75;margin-bottom:18px;}
.gd-title{font-family:var(--font-gd-display);font-size:clamp(60px,7vw,100px);line-height:.88;letter-spacing:.03em;color:#fff;margin-bottom:24px;}
.gd-title .gd-gold{color:var(--gold);}
.gd-num{display:block;font-family:var(--font-gd-display);font-size:110px;line-height:1;color:var(--gold);opacity:.055;margin-bottom:-28px;}
.gd-section-title{font-family:var(--font-gd-display);font-size:clamp(50px,5.8vw,84px);line-height:.88;letter-spacing:.03em;color:#fff;margin-bottom:20px;}
.gd-line{width:40px;height:1px;background:var(--gold);opacity:.45;margin-bottom:22px;}
.gd-text{font-family:var(--font-gd-mono);font-size:.76rem;line-height:1.92;color:rgba(255,255,255,.4);font-style:italic;max-width:320px;}
.gd-kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(201,168,76,.12);border-radius:4px;overflow:hidden;margin-top:28px;}
.gd-kpi{background:rgba(0,0,0,.65);padding:18px 16px;}
.gd-kpi-v{font-family:var(--font-gd-display);font-size:2.3rem;line-height:1;color:var(--gold);}
.gd-kpi-l{font-family:var(--font-gd-mono);font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-top:4px;}
.gd-statement{font-family:var(--font-gd-display);font-size:clamp(46px,6.5vw,88px);line-height:.98;color:#fff;max-width:840px;}
.gd-statement em{color:var(--gold);font-style:normal;}

.gd-marquee{position:absolute;bottom:0;left:0;right:0;z-index:35;border-top:1px solid rgba(201,168,76,.12);padding:10px 0;overflow:hidden;background:rgba(0,0,0,.6);pointer-events:none;}
.gd-track{display:flex;width:max-content;animation:marquee 22s linear infinite;}
.gd-track span{padding:0 32px;color:var(--gold);font-family:var(--font-gd-display);font-size:13px;letter-spacing:.15em;opacity:.45;white-space:nowrap;}

.gd-dots{position:absolute;right:44px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:40;}
.gd-dot{width:6px;height:6px;border-radius:50%;background:rgba(168,149,82,.2);border:1px solid rgba(168,149,82,.35);transition:.3s;}
.gd-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(168,149,82,.65);}

/* LEAD */
#lead{background:#000;padding:150px 6vw 130px;position:relative;overflow:hidden;}
#lead::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(168,149,82,.05),transparent 60%);pointer-events:none;}
.lead-wrap{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:70px;position:relative;z-index:1;}
.lead-head{text-align:center;display:flex;flex-direction:column;align-items:center;gap:26px;}
.lead-head .label{justify-content:center;margin-bottom:0;}
.lead-title{font-family:var(--font-display);font-size:clamp(3rem,5.8vw,6.8rem);font-weight:900;line-height:.9;color:#fff;}
.lead-title .gold{color:var(--gold)}
.lead-copy{max-width:760px;font-size:1rem;line-height:1.9;color:rgba(255,255,255,.62);font-weight:300;}
.lead-form{width:100%;max-width:760px;}
.form-block{display:flex;flex-direction:column;gap:18px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:17px}
.f-field{display:flex;flex-direction:column;gap:7px}
.f-field label{font-family:var(--font-ui);font-size:.62rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.32)}
.f-field input,.f-field textarea,.f-field select{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:2px;color:#fff;font-family:var(--font-body);font-size:.92rem;font-weight:300;padding:14px 16px;outline:none;}
.f-field input:focus,.f-field textarea:focus,.f-field select:focus{border-color:rgba(168,149,82,.7);background:rgba(168,149,82,.075)}
.f-field textarea{resize:vertical;min-height:120px}
.f-field select option{background:#000}
.btn-submit{color:#000;background:var(--gold);border:none;padding:18px 44px;align-self:flex-start}
.btn-submit:hover{background:var(--gold2);transform:translateY(-2px)}

/* FOOTER */
footer{background:#000;border-top:1px solid rgba(168,149,82,.16);padding:95px 6vw 75px;display:grid;grid-template-columns:1.1fr 2fr;gap:90px;align-items:start;}
.ft-brand{display:flex;flex-direction:column;gap:38px;}
.ft-logo{width:235px;opacity:.98;}
.ft-socials{display:flex;align-items:center;gap:22px;}
.ft-socials a{width:24px;height:24px;color:#fff;opacity:.72;transition:.2s;display:inline-flex;align-items:center;justify-content:center;}
.ft-socials a:hover{color:var(--gold);opacity:1;transform:translateY(-2px);}
.ft-socials svg{width:100%;height:100%;fill:currentColor;}
.ft-info{display:grid;grid-template-columns:repeat(3,1fr);gap:48px;}
.ft-item p,.ft-item a{font-size:1.1rem;line-height:1.8;color:rgba(255,255,255,.74);text-decoration:none;font-weight:400;}
.ft-item a:hover{color:var(--gold);}
.ft-h{font-family:var(--font-ui);font-size:.82rem!important;font-weight:800!important;letter-spacing:.28em;text-transform:uppercase;color:rgba(168,149,82,1)!important;margin-bottom:18px;}
.ft-bar{background:#000;border-top:1px solid rgba(255,255,255,.05);padding:22px 6vw;display:flex;justify-content:space-between;align-items:center;}
.ft-copy{font-family:var(--font-ui);font-size:.6rem;letter-spacing:.12em;color:rgba(255,255,255,.2);}

/* LEAFLET */
.leaflet-container{background:#101010!important}
.leaflet-control-attribution{display:none}
.leaflet-control-zoom a{background:#0d0d0d!important;color:var(--gold)!important;border:1px solid rgba(168,149,82,.42)!important;}
.leaflet-control-zoom a:hover{background:var(--gold)!important;color:#000!important}
.leaflet-popup-content-wrapper{background:rgba(0,0,0,.96)!important;border:1px solid rgba(168,149,82,.24)!important;border-radius:6px!important;box-shadow:0 20px 60px rgba(0,0,0,.6)!important;}
.leaflet-popup-tip{background:#000!important}
.leaflet-popup-content{margin:16px 18px!important;color:#fff!important}
.pop-name{font-family:var(--font-ui);font-size:1rem;font-weight:700;color:#fff;margin-bottom:4px}
.pop-sub{font-size:.78rem;color:rgba(255,255,255,.58);margin-bottom:10px}
.pop-count{display:inline-block;font-family:var(--font-display);font-size:1.4rem;font-weight:900;color:var(--gold)}
.pop-label{font-family:var(--font-ui);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.34);margin-top:2px}

/* REVEAL */
.reveal{opacity:0;transform:translateY(52px);transition:opacity .9s,transform .9s}
.reveal.on{opacity:1;transform:translateY(0)}
.d1{transition-delay:.1s}.d2{transition-delay:.22s}.d3{transition-delay:.36s}

/* RESPONSIVE */
@media(max-width:1000px){
  html,body{cursor:auto}
  #cur,#cur-ring{display:none}
  nav{height:70px}.nav-logo img{height:32px}
  nav .nav-links a:not(.nav-cta){display:none}
  .hero-inner{margin-left:0}
  .hero-title{font-size:clamp(4.4rem,16vw,9rem);max-width:9ch}
  #hero{min-height:105vh;padding:110px 0 90px}
  .approach-grid{grid-template-columns:1fr;gap:60px}
  .approach-copy{padding-left:0}
  .locator-panel{max-width:100%;justify-self:stretch}
  #storeMap{height:430px}
  .stats-wrap{grid-template-columns:1fr}
  .gd-can-wrap{width:42vw;}
  .gd-panel{padding:0 5vw;}
  .gd-panel.gd-right{justify-content:flex-start;}
  .gd-content{max-width:100%}
  .gd-dots{display:none}
  .form-row{grid-template-columns:1fr}
  .btn-submit{width:100%;text-align:center}
  footer{grid-template-columns:1fr;gap:55px}
  .ft-info{grid-template-columns:1fr;gap:34px}
  .ft-logo{width:220px}

<script>
/* CURSOR */
const cur=document.getElementById('cur');
const ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function animRing(){rx+=(mx-rx)*.11;ry+=(my-ry)*.11;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);})();

/* NAV */
window.addEventListener('scroll',()=>{document.getElementById('nav').classList.toggle('scrolled',window.scrollY>70);},{passive:true});

/* TAPE */

const ti=document.getElementById('tapeInner');
const chunk=()=>WORDS.map(w=>`<span class="tape-item">${w}<span class="tape-dot"></span></span>`).join('');
ti.innerHTML=chunk()+chunk();

/* MAP */
const STORES=[
  {name:'Albert Heijn',sub:'Supermarktketen · Landelijk',count:'1.100+',lat:52.373,lon:4.892},
  {name:'Jumbo',sub:'Supermarktketen · Landelijk',count:'700+',lat:51.921,lon:4.470},
  {name:'Spar',sub:'Supermarktketen · Landelijk',count:'300+',lat:52.631,lon:4.749},
  {name:'Plus Supermarkt',sub:'Supermarktketen · Landelijk',count:'260+',lat:52.090,lon:5.121},
  {name:'Kruidvat',sub:'Drogisterij · Landelijk',count:'750+',lat:52.070,lon:4.310},
  {name:'Trekpleister',sub:'Drogisterij · Landelijk',count:'170+',lat:51.437,lon:5.478},
  {name:'Gall & Gall',sub:'Slijterijen · Landelijk',count:'580+',lat:52.359,lon:4.878},
  {name:'Foodservice HoReCa',sub:'HoReCa · Landelijk',count:'400+',lat:50.851,lon:5.691},
  {name:'Decathlon',sub:'Sport · Landelijk',count:'54+',lat:52.311,lon:4.950},

  {name:'de Tuinen',sub:'Health · Landelijk',count:'120+',lat:52.354,lon:4.869},
  {name:'Bol.com / Online',sub:'E-commerce · Landelijk',count:'Online',lat:52.155,lon:5.387}
];
function createGoldIcon(){
  return L.divIcon({className:'',html:`<div style="position:relative;width:14px;height:14px;border-radius:50% 50% 50% 0;background:linear-gradient(135deg,#f5e8a8 0%,#a89552 48%,#564821 100%);transform:rotate(-45deg);border:1px solid rgba(255,255,255,.58);box-shadow:0 0 11px rgba(168,149,82,.34),inset 0 1px 2px rgba(255,255,255,.62);"><span style="position:absolute;width:5px;height:5px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:#050505;"></span></div>`,iconSize:[18,18],iconAnchor:[9,18],popupAnchor:[0,-16]});
}
const map=L.map('storeMap',{center:[52.18,5.30],zoom:6.35,zoomSnap:.25,scrollWheelZoom:true,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
STORES.forEach(pin=>{
  L.marker([pin.lat,pin.lon],{icon:createGoldIcon()})
    .bindPopup(`<div class="pop-name">${pin.name}</div><div class="pop-sub">${pin.sub}</div><div class="pop-count">${pin.count}</div><div class="pop-label">aangesloten locaties</div>`)
    .addTo(map);
});

/* REVEAL */
const revIO=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('on');revIO.unobserve(e.target);}});},{threshold:.1});

/* COUNT-UP */
function countUp(el,target){
  const dur=1900,t0=performance.now();
  const go=now=>{const p=Math.min((now-t0)/dur,1);const e=1-Math.pow(1-p,3);el.querySelector('.count').textContent=Math.round(e*target).toLocaleString('nl-NL');if(p<1)requestAnimationFrame(go);else el.querySelector('.count').textContent=target.toLocaleString('nl-NL');};
  requestAnimationFrame(go);
}
const statIO=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){countUp(e.target,+e.target.dataset.target);statIO.unobserve(e.target);}});},{threshold:.5});
document.querySelectorAll('.stat-n[data-target]').forEach(el=>statIO.observe(el));

/* GOLD DRY SHOWCASE */
(function(){
  const GD_PANELS=5;
  const wrapper=document.getElementById('gd-scroll-wrapper');
  const can=document.getElementById('gdCan');
  const progBar=document.getElementById('gd-progress');
  const dotsWrap=document.getElementById('gdDots');

  /* marquee */
  const gdTrack=document.getElementById('gdTrack');
  ['GOLD DRY ✦','STAY GOLD ✦','250ML PREMIX ✦','ZERO SUGAR ✦','ORIGINAL & VODKA ✦','ALC. 5.5% ✦'].forEach(w=>{
    const s=document.createElement('span');s.textContent=w;gdTrack.appendChild(s);
  });
  [...gdTrack.children].forEach(s=>{const c=s.cloneNode(true);gdTrack.appendChild(c);});

  /* dots */
  for(let i=0;i<GD_PANELS;i++){const d=document.createElement('div');d.className='gd-dot'+(i===0?' active':'');dotsWrap.appendChild(d);}
  const dots=[...dotsWrap.querySelectorAll('.gd-dot')];

  const states=[
    {x:18, y:0,  r:-4, s:1.00},
    {x:-18,y:4,  r:8,  s:.92},
    {x:18, y:-2, r:-8, s:.95},
    {x:0,  y:2,  r:0,  s:1.04},
    {x:0,  y:-6, r:4,  s:.88}
  ];

  let mouseX=0,mouseY=0;
  let cur={x:0,y:0,r:0,s:1};
  let activePanel=0;

  document.addEventListener('mousemove',e=>{mouseX=(e.clientX/innerWidth-.5)*2;mouseY=(e.clientY/innerHeight-.5)*2;});

  function lerp(a,b,t){return a+(b-a)*t;}
  function smooth(t){return t*t*(3-2*t);}

  function getT(){
    const rect=wrapper.getBoundingClientRect();
    const total=wrapper.offsetHeight-innerHeight;
    return total>0?Math.max(0,Math.min(1,-rect.top/total)):0;
  }

  function interpState(t){
    const raw=t*(states.length-1);
    const i=Math.min(Math.floor(raw),states.length-2);
    const loc=smooth(raw-i);
    const a=states[i],b=states[i+1];
    return{x:lerp(a.x,b.x,loc),y:lerp(a.y,b.y,loc),r:lerp(a.r,b.r,loc),s:lerp(a.s,b.s,loc)};
  }

  function setPanel(idx){
    if(idx===activePanel)return;
    activePanel=idx;
    document.querySelectorAll('.gd-panel').forEach((p,i)=>p.classList.toggle('gd-active',i===idx));
    dots.forEach((d,i)=>d.classList.toggle('active',i===idx));
  }

  function tick(){
    requestAnimationFrame(tick);
    const t=getT();
    const target=interpState(t);
    cur.x=lerp(cur.x,target.x,.06);
    cur.y=lerp(cur.y,target.y,.06);
    cur.r=lerp(cur.r,target.r,.06);
    cur.s=lerp(cur.s,target.s,.06);
    const mx2=mouseX*1.5,my2=mouseY*1.2;
    can.style.transform=`translate(calc(-50% + ${cur.x+mx2}vw),calc(-50% + ${cur.y+my2}vh)) rotate(${cur.r+mouseX*2}deg) scale(${cur.s})`;
    progBar.style.width=(t*100)+'%';
    setPanel(Math.min(Math.floor(t*GD_PANELS),GD_PANELS-1));
  }
  tick();
})();
</script>
